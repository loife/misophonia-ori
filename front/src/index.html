<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Player</title>
  </head>
  <body>

    <button id="load-button" onclick="handleUpload(event)">Load Video</button>

    <div class="video-container">
      <video
        id="my-video"
        class="video-js"
        controls
        preload="auto"
        >
        <p class="vjs-no-js">
          To view this video please enable JavaScript, and consider upgrading to a
          web browser that
          <a href="https://videojs.com/html5-video-support/" target="_blank"
            >supports HTML5 video</a
          >
        </p>
      </video>
    </div>
  </body>
</html>
